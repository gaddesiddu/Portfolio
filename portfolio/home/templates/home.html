<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://getbootstrap.com/docs/5.3/assets/css/docs.css"
      rel="stylesheet"
    />
    <title>Home</title>
    <style>
      /* Center images within carousel items */
      .carousel-item img {
        display: block;
        margin: 0 auto;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="p-1 m-0 border-0 bd-example m-0 border-0">
    <!-- Example Code -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-body-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Gadde Siddartha</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/projects">projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/contact">Contact me</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>
        </div>
      </div>
    </nav>
    <div class="container-fluid mt-0 p-0 mb-1">
      <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
          <button
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide-to="0"
            class="active"
            aria-current="true"
            aria-label="Slide 1"
          ></button>
          <button
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide-to="1"
            aria-label="Slide 2"
          ></button>
          <button
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide-to="2"
            aria-label="Slide 3"
          ></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="https://source.unsplash.com/random/1900x500/?coding,programming"
              class="d-block mx-auto w-100"
              alt="image"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://source.unsplash.com/random/1900x500/?coding,html"
              class="d-block mx-auto w-100"
              alt="img2"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://source.unsplash.com/random/1900x500/?coding,backend programming"
              class="d-block mx-auto w-100"
              alt="img3"
            />
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExampleIndicators"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExampleIndicators"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </div>
    <div class="container my-3">
      <div class="row">
        <div class="col-md-4">
          <div class="card">
            <img
              src="https://source.unsplash.com/random/500x300/?About me,Education"
              class="card-img-top"
              alt="card1"
            />
            <div class="card-body">
              <h5 class="card-title">About</h5>
              <p class="card-text">About my education</p>
              <a href="/about" class="btn btn-primary">Click here</a>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <img
              src="https://source.unsplash.com/random/500x300/?Projects,Experience"
              class="card-img-top"
              alt="card2"
            />
            <div class="card-body">
              <h5 class="card-title">Projects</h5>
              <p class="card-text">Projects done by me which are deployed</p>
              <a href="/projects" class="btn btn-primary">Click here</a>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card">
            <img
              src="https://source.unsplash.com/random/500x300/?Email,call"
              class="card-img-top"
              alt="card3"
            />
            <div class="card-body">
              <h5 class="card-title">Contact</h5>
              <p class="card-text">To contact me</p>
              <a href="/contact" class="btn btn-primary">Click here</a>
            </div>
          </div>
        </div>
      </div>
      <footer class="bg-dark text-light">
        <p class="text-center py-1 my-0 mt-1">
          Copyright 2023 | All rights reserved
        </p>
      </footer>
    </div>
    <!-- End Example Code -->
  </body>
</html>
